name: checkstack

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checkstack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../services/api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/checkstack
      PUBLIC_BASE_URL: http://web:3000
      # Optional: set for Slack/email; see .env.example
      SLACK_DEFAULT_WEBHOOK_URL: ""
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-checkstack@localhost}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../../services/api
    command: ["python", "-m", "app.workers.uptime_worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/checkstack
      CHECK_INTERVAL_SECONDS: "15"
      CHECK_TIMEOUT_SECONDS: ${CHECK_TIMEOUT_SECONDS:-10}
      CHECK_RETRY_ATTEMPTS: ${CHECK_RETRY_ATTEMPTS:-3}
      INCIDENT_OPEN_AFTER_FAILURES: ${INCIDENT_OPEN_AFTER_FAILURES:-3}
      INCIDENT_CLOSE_AFTER_SUCCESSES: ${INCIDENT_CLOSE_AFTER_SUCCESSES:-2}
      INCIDENT_DEBOUNCE_SECONDS: ${INCIDENT_DEBOUNCE_SECONDS:-120}
      PUBLIC_BASE_URL: http://web:3000
      SLACK_DEFAULT_WEBHOOK_URL: ""
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-checkstack@localhost}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../../services/web
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
