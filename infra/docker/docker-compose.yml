name: checkstack

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checkstack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../services/api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/checkstack
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../../services/api
    command: ["python", "-m", "app.workers.uptime_worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/checkstack
      CHECK_INTERVAL_SECONDS: "15"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../../services/web
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
